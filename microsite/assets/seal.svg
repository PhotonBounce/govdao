<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" aria-label="GOVDAO governance seal">
  <!-- Outer decorative ring -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#c98340" stroke-width="8"/>
  <!-- Second ring (fine detail) -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#c98340" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner disc -->
  <circle cx="100" cy="100" r="70" fill="#1f1b18"/>
  <!-- Inner ring on disc -->
  <circle cx="100" cy="100" r="64" fill="none" stroke="#c98340" stroke-width="1" opacity="0.3"/>

  <!-- Radial tick marks on outer ring -->
  <g stroke="#c98340" stroke-width="2" opacity="0.5">
    <line x1="100" y1="9" x2="100" y2="18"/>
    <line x1="100" y1="182" x2="100" y2="191"/>
    <line x1="9" y1="100" x2="18" y2="100"/>
    <line x1="182" y1="100" x2="191" y2="100"/>
    <line x1="35.1" y1="35.1" x2="41.5" y2="41.5"/>
    <line x1="158.5" y1="158.5" x2="164.9" y2="164.9"/>
    <line x1="164.9" y1="35.1" x2="158.5" y2="41.5"/>
    <line x1="41.5" y1="158.5" x2="35.1" y2="164.9"/>
  </g>

  <!-- Box / ballot bin body -->
  <rect x="60" y="108" width="80" height="52" rx="4" ry="4" fill="#2a2318" stroke="#c98340" stroke-width="2"/>

  <!-- Ballot slot opening -->
  <rect x="82" y="104" width="36" height="8" rx="4" ry="4" fill="white"/>

  <!-- Ballot paper (partially inserted, bronze tint) -->
  <rect x="88" y="82" width="24" height="32" rx="2" ry="2" fill="#c98340" opacity="0.9"/>
  <!-- Lines on ballot paper -->
  <line x1="93" y1="89" x2="107" y2="89" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="93" y1="94" x2="107" y2="94" stroke="white" stroke-width="1.5" opacity="0.8"/>
  <line x1="93" y1="99" x2="101" y2="99" stroke="white" stroke-width="1.5" opacity="0.8"/>

  <!-- Text label -->
  <text x="100" y="150" text-anchor="middle" font-family="monospace" font-size="9" fill="#e8c87a" letter-spacing="3" opacity="0.9">GOVDAO</text>
</svg>

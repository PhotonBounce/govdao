name: Build APK and deploy to site

on:
  workflow_dispatch:
  push:
    branches: [claude/bold-shannon-3gx5xo, main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/bold-shannon-3gx5xo

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install root deps
        run: npm ci

      - name: Install mobile deps
        run: npm --prefix apps/mobile ci

      - name: Expo prebuild (generate Android project)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean --no-install

      - name: Bundle JavaScript into APK assets
        working-directory: apps/mobile
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file node_modules/expo/AppEntry.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build debug APK (JS bundled, signed with debug keystore)
        working-directory: apps/mobile/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Copy APK to microsite folder
        run: |
          cp apps/mobile/android/app/build/outputs/apk/debug/app-debug.apk microsite/govdao/GOVDAO.apk
          ls -lh microsite/govdao/GOVDAO.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: GOVDAO-debug
          path: microsite/govdao/GOVDAO.apk
          retention-days: 30

      - name: Deploy APK to FTP
        if: ${{ vars.FTP_CONFIGURED == 'true' || github.event_name == 'workflow_dispatch' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ftp.photon-bounce.com
          username: photonb
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: microsite/govdao/
          server-dir: public_html/govdao/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

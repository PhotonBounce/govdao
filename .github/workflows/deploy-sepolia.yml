name: Deploy to Sepolia

on:
  workflow_dispatch:
    inputs:
      initial_member:
        description: "Ethereum address to seed as the first DAO member (your MetaMask address)"
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy contracts → update manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Deploy to Sepolia
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          INITIAL_MEMBERS: ${{ github.event.inputs.initial_member }}
        run: npx hardhat run scripts/deploy.ts --network sepolia

      - name: Patch app manifest with Sepolia addresses
        env:
          RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
        run: |
          # Surgically update only chain + contracts so local app overrides
          # (fixture feed URLs, plan tier) are preserved and the sync gate stays green.
          node -e '
            const fs = require("fs");
            const dep = JSON.parse(fs.readFileSync("deployments/sepolia.json", "utf8"));
            const path = "apps/mobile/src/data/app.manifest.json";
            const m = JSON.parse(fs.readFileSync(path, "utf8"));
            const rpc = process.env.RPC_URL && process.env.RPC_URL.length ? process.env.RPC_URL : m.chain.rpcUrl;
            m.app.environment = "sepolia";
            m.chain.id = dep.chainId || 11155111;
            m.chain.name = "sepolia";
            m.chain.rpcUrl = rpc;
            m.chain.blockExplorer = "https://sepolia.etherscan.io";
            m.contracts = { ...m.contracts, ...dep.contracts };
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + "\n");
            console.log("Patched chain + contracts:\n" + JSON.stringify({ chain: m.chain, contracts: m.contracts }, null, 2));
          '

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/sepolia.json apps/mobile/src/data/app.manifest.json
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: wire Sepolia contract addresses into app manifest"
          git push

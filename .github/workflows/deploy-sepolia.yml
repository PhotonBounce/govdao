name: Deploy to Sepolia

on:
  workflow_dispatch:
    inputs:
      initial_member:
        description: "Ethereum address to seed as the first DAO member (your MetaMask address)"
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy contracts → update manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Deploy to Sepolia
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          INITIAL_MEMBERS: ${{ github.event.inputs.initial_member }}
        run: npx hardhat run scripts/deploy.ts --network sepolia

      - name: Wire manifest with real addresses
        env:
          SEPOLIA_RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          RPC_URL: ${{ secrets.SEPOLIA_RPC_URL }}
          BLOCK_EXPLORER_URL: "https://sepolia.etherscan.io"
        run: npx ts-node scripts/wire-manifest.ts --network sepolia

      - name: Copy production manifest into app
        run: |
          cp config/mobile-app.manifest.production.json apps/mobile/src/data/app.manifest.json
          echo "Updated app.manifest.json:"
          cat apps/mobile/src/data/app.manifest.json | grep -A5 '"contracts"'

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/sepolia.json
          git add config/mobile-app.manifest.production.json
          git add apps/mobile/src/data/app.manifest.json
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: wire Sepolia contract addresses into app manifest"
          git push

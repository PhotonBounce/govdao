name: Release to Google Play

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      track:
        description: "Play Store track"
        required: true
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]

jobs:
  build-and-submit:
    name: Build AAB & submit to Play Store
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/mobile/package-lock.json

      - name: Install dependencies
        run: |
          npm ci
          npm --prefix apps/mobile ci

      - name: Restore upload keystore
        working-directory: apps/mobile
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          mkdir -p ../../secrets
          # Strip certutil header/footer lines and any Windows line endings before decoding
          echo "$KEYSTORE_BASE64" \
            | grep -v '^-----' \
            | tr -d '\r\n ' \
            | base64 --decode > ../../secrets/govdao-upload.keystore
          # Verify the file was written and is non-empty
          test -s ../../secrets/govdao-upload.keystore || { echo "Keystore decode failed — check KEYSTORE_BASE64 secret"; exit 1; }

      - name: Write credentials.json
        working-directory: apps/mobile
        run: |
          cat > credentials.json <<EOF
          {
            "android": {
              "keystore": {
                "keystorePath": "../../secrets/govdao-upload.keystore",
                "keystorePassword": "${{ secrets.KEYSTORE_PASSWORD }}",
                "keyAlias": "govdao",
                "keyPassword": "${{ secrets.KEY_PASSWORD }}"
              }
            }
          }
          EOF

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Register or resolve EAS project
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          # Fetch account name from the token
          ACCOUNT=$(curl -sf -H "Authorization: Bearer $EXPO_TOKEN" \
            https://api.expo.dev/v2/auth/userinfo | jq -r '.data.username')
          echo "Expo account: $ACCOUNT"

          SLUG="govdao-mobile"

          # Try to fetch existing project
          PROJECT_ID=$(curl -sf \
            -H "Authorization: Bearer $EXPO_TOKEN" \
            "https://api.expo.dev/v2/projects?slug=${SLUG}&ownerAccount=${ACCOUNT}" \
            | jq -r '.data[0].id // empty')

          if [ -z "$PROJECT_ID" ]; then
            echo "Project not found — creating..."
            PROJECT_ID=$(curl -sf -X POST \
              -H "Authorization: Bearer $EXPO_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"accountName\":\"${ACCOUNT}\",\"projectName\":\"${SLUG}\",\"privacy\":\"unlisted\"}" \
              https://api.expo.dev/v2/projects \
              | jq -r '.data.id')
            echo "Created project: $PROJECT_ID"
          else
            echo "Found existing project: $PROJECT_ID"
          fi

          [ -z "$PROJECT_ID" ] && { echo "Failed to obtain EAS project ID"; exit 1; }

          # Inject projectId into app.json at build time
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('app.json','utf8'));
            cfg.expo.extra = cfg.expo.extra || {};
            cfg.expo.extra.eas = cfg.expo.extra.eas || {};
            cfg.expo.extra.eas.projectId = '$PROJECT_ID';
            fs.writeFileSync('app.json', JSON.stringify(cfg, null, 2));
            console.log('Wrote projectId', '$PROJECT_ID', 'to app.json');
          "

      - name: Run mobile QA gates
        run: |
          npm run mobile:typecheck
          npm run mobile:check-manifest

      - name: Build Android App Bundle (AAB)
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile production --local --non-interactive --output build.aab

      - name: Determine Play Store track
        id: track
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "track=${{ github.event.inputs.track }}" >> $GITHUB_OUTPUT
          else
            echo "track=internal" >> $GITHUB_OUTPUT
          fi

      - name: Submit to Google Play
        working-directory: apps/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
        run: |
          echo "$GOOGLE_SERVICE_ACCOUNT_KEY" > /tmp/service-account.json
          eas submit --platform android --path build.aab \
            --non-interactive \
            --android-service-account-key-path /tmp/service-account.json \
            --track ${{ steps.track.outputs.track }}

      - name: Clean up secrets
        if: always()
        run: |
          rm -f apps/mobile/credentials.json
          rm -f secrets/govdao-upload.keystore
          rm -f /tmp/service-account.json

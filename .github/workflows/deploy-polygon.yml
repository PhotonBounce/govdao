name: Deploy to Polygon Mainnet

on:
  workflow_dispatch:
    inputs:
      proposer_address:
        description: "Optional. If your DEPLOYER key is NOT your MetaMask account, put your MetaMask address here to seed it as a Proposer (propose + vote). Leave blank if you deploy with your own MetaMask key — that account becomes ADMIN automatically (propose + vote + execute)."
        required: false
        default: ""
      executor_address:
        description: "Optional. Extra address to seed as an Executor (can execute queued proposals). Leave blank if deployer is your MetaMask — deployer is already ADMIN which includes executor rights."
        required: false
        default: ""
      initial_members:
        description: "Optional. Comma-separated addresses to seed as basic Members (can vote but not propose). Leave blank to add members via governance later."
        required: false
        default: ""

jobs:
  deploy:
    name: Deploy contracts → wire manifest → commit
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install root dependencies
        run: npm ci

      - name: Compile contracts
        run: npm run compile

      - name: Deploy to Polygon
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          INITIAL_PROPOSERS: ${{ github.event.inputs.proposer_address }}
          INITIAL_EXECUTORS: ${{ github.event.inputs.executor_address }}
          INITIAL_MEMBERS: ${{ github.event.inputs.initial_members }}
        run: npx hardhat run scripts/deploy.ts --network polygon

      - name: Verify contracts on Polygonscan
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          POLYGONSCAN_API_KEY: ${{ secrets.POLYGONSCAN_API_KEY }}
        run: |
          # Skip silently if no API key configured
          if [ -z "$POLYGONSCAN_API_KEY" ]; then
            echo "POLYGONSCAN_API_KEY not set — skipping verification"
            exit 0
          fi
          dep=$(cat deployments/polygon.json)
          mr=$(echo "$dep" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).contracts.memberRegistry))")
          tl=$(echo "$dep" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).contracts.timelock))")
          gov=$(echo "$dep" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).contracts.governor))")
          tr=$(echo "$dep" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).contracts.treasury))")
          eg=$(echo "$dep" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>console.log(JSON.parse(d).contracts.emergencyGuardian))")
          npx hardhat verify --network polygon "$mr" || true
          npx hardhat verify --network polygon "$tl" || true
          npx hardhat verify --network polygon "$gov" || true
          npx hardhat verify --network polygon "$tr" || true
          npx hardhat verify --network polygon "$eg" || true

      - name: Patch app manifest with Polygon addresses
        env:
          RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
        run: |
          # Surgically update only chain + contracts so local app overrides
          # (fixture feed URLs, plan tier) are preserved and the sync gate stays green.
          node -e '
            const fs = require("fs");
            const dep = JSON.parse(fs.readFileSync("deployments/polygon.json", "utf8"));
            const path = "apps/mobile/src/data/app.manifest.json";
            const m = JSON.parse(fs.readFileSync(path, "utf8"));
            const rpc = process.env.RPC_URL && process.env.RPC_URL.length ? process.env.RPC_URL : "https://polygon-rpc.com";
            m.app.environment = "polygon";
            m.chain.id = dep.chainId || 137;
            m.chain.name = "polygon";
            m.chain.rpcUrl = rpc;
            m.chain.blockExplorer = "https://polygonscan.com";
            m.contracts = { ...m.contracts, ...dep.contracts };
            fs.writeFileSync(path, JSON.stringify(m, null, 2) + "\n");
            console.log("Patched chain + contracts:\n" + JSON.stringify({ chain: m.chain, contracts: m.contracts }, null, 2));
          '

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/polygon.json apps/mobile/src/data/app.manifest.json
          git diff --staged --quiet && echo "Nothing to commit" || \
            git commit -m "chore: wire Polygon mainnet contract addresses into app manifest"
          git push
